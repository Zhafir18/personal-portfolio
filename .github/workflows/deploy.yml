name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 1. Masuk ke direktori home
          cd ~

          # 2. Cek apakah folder project sudah ada, jika belum lakukan clone
          # Ganti URL di bawah dengan URL Repository GitHub kamu!
          if [ ! -d "portfolio" ]; then
            git clone https://github.com/username_kamu/repo_kamu.git portfolio
          fi

          # 3. Masuk ke folder project
          cd ~/portfolio

          # 4. Ambil perubahan kode terbaru
          git pull origin main

          # 5. Build Image (Proses ini dilakukan di VPS)
          # Pastikan SWAP 4GB sudah aktif agar tidak freeze
          docker build -t zhafir-portfolio:latest .

          # 6. Re-deploy Container
          docker stop zhafir-portfolio || true
          docker rm zhafir-portfolio || true

          docker run -d \
            --name zhafir-portfolio \
            -p 6969:6969 \
            --restart always \
            zhafir-portfolio:latest

          # 7. Pembersihan Disk 60GB
          docker image prune -f