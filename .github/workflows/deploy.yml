name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # Masuk ke folder project (asumsi folder sudah ada)
          mkdir -p ~/portfolio && cd ~/portfolio
          
          # Kamu bisa mengirimkan file Dockerfile & source code via git pull di server
          # Atau jika repo privat, pastikan server punya akses git.
          cd ~/path-ke-project-kamu
          git pull origin main

          # Build image secara lokal di server
          docker build -t zhafir-portfolio:latest .

          # Hapus kontainer lama
          docker stop zhafir-portfolio || true
          docker rm zhafir-portfolio || true

          # Jalankan kontainer baru
          docker run -d \
            --name zhafir-portfolio \
            -p 6969:6969 \
            --restart always \
            zhafir-portfolio:latest

          # Bersihkan image lama yang tidak terpakai (menghemat disk 60GB kamu)
          docker image prune -f