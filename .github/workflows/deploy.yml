name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [22.x]
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Build TypeScript
      run: npm run build

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build . -t zhafir-portfolio:latest

    - name: Deploy Container
      run: |
        # Hapus kontainer lama
        docker stop zhafir-portfolio || true
        docker rm zhafir-portfolio || true
        
        # Jalankan kontainer baru dengan menggunakan --env-file dari path server Anda
        docker run -d \
          --name zhafir-portfolio \
          -p 6969:6969 \
          zhafir-portfolio:latest

    - name: Cleanup old images
      run: docker image prune -f